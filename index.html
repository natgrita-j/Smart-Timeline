<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Timeline & Audit Log - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Prompt', sans-serif; background-color: #F8F9FA; color: #2C3E50; }
        .bg-primary { background-color: #2C3E50; }
        .bg-accent { background-color: #27AE60; }
        .gantt-container { overflow-x: auto; border: 1px solid #e5e7eb; border-radius: 8px; background: white; }
        .gantt-grid-wrapper { display: inline-block; min-width: 100%; }
        .gantt-row { display: flex; width: max-content; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 40; border-right: 2px solid #e5e7eb; width: 180px; min-width: 180px; padding: 0 12px; display: flex; align-items: center; font-size: 11px; height: 38px; }
        .day-grid { display: grid; grid-template-columns: repeat(365, 30px); } /* ปรับความกว้างช่องเป็น 30px */
        .day-cell { border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; height: 38px; width: 30px; display: flex; align-items: center; justify-content: center; font-size: 9px; position: relative; }
        .month-header-wrapper { display: flex; margin-left: 180px; } /* เว้นที่ให้ตรงกับ Sticky Col */
        .month-header { border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; background: #f8fafc; font-weight: 600; font-size: 11px; display: flex; align-items: center; justify-content: center; height: 30px; }
        .weekend { background-color: #f8fafc; color: #cbd5e1; }
        .holiday-cell { background-color: #fee2e2 !important; }
        .today-cell { background-color: rgba(44, 62, 80, 0.05); }
        .today-line { width: 2px; background: #2C3E50; height: 100%; position: absolute; left: 50%; z-index: 30; pointer-events: none; }
        .task-bar { height: 16px; border-radius: 4px; margin: auto 0; z-index: 10; position: relative; min-width: 4px; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-[1600px] mx-auto mb-6 bg-white p-6 rounded-xl shadow-sm border-l-4 border-[#27AE60]">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-[#2C3E50]">Smart Timeline & Audit Log</h1>
                <p class="text-gray-500 text-sm">Yearly View with QA Estimation Tool</p>
            </div>
            <button onclick="scrollToToday()" class="bg-[#2C3E50] text-white px-6 py-2 rounded-lg font-semibold hover:bg-slate-700 transition shadow-md">Jump to Today</button>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto grid grid-cols-1 xl:grid-cols-4 gap-6">
        
        <div class="xl:col-span-1 space-y-6">
            <section class="bg-emerald-50 p-5 rounded-xl border border-emerald-200">
                <h2 class="font-bold mb-3 text-emerald-800 flex items-center gap-2">🛠 QA Estimation Tool</h2>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] font-bold text-emerald-700 uppercase">Dev Team Size</label>
                            <input type="number" id="numDevs" value="1" min="1" class="w-full border p-2 rounded text-sm outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-emerald-700 uppercase">QA Team Size</label>
                            <input type="number" id="numQAs" value="1" min="1" class="w-full border p-2 rounded text-sm outline-none">
                        </div>
                    </div>
                    <button onclick="calculateAndSuggestQA()" class="w-full bg-emerald-600 text-white py-2 rounded font-bold text-xs hover:bg-emerald-700 transition">Suggest QA Mandays</button>
                    <div id="qaResultBox" class="hidden mt-2 p-2 bg-white rounded border border-emerald-100 text-[11px] text-emerald-700">
                        <p id="qaResultText"></p>
                    </div>
                </div>
            </section>

            <section class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 class="font-bold mb-4 text-xs uppercase text-gray-400">Settings</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold mb-1">Public Holidays</label>
                        <textarea id="holidaysInput" class="w-full border p-2 rounded-lg text-xs h-12 outline-none focus:border-[#27AE60]"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold mb-1">Assignees</label>
                        <div id="assigneeList" class="flex flex-wrap gap-1 mb-2"></div>
                        <div class="flex gap-1">
                            <input type="text" id="newAssignee" class="flex-1 border p-1 rounded text-xs" placeholder="+ Name">
                            <button onclick="addItem('assignees', 'newAssignee')" class="bg-primary text-white px-2 rounded">+</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h2 id="formTitle" class="font-bold mb-4 text-[#2C3E50]">Create Task</h2>
                <input type="hidden" id="editingId" value="">
                <div class="space-y-3">
                    <input type="text" id="taskName" placeholder="Task Name" class="w-full border p-2 rounded-lg text-sm outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="taskAssignee" class="border p-2 rounded-lg text-sm"></select>
                        <select id="taskRole" class="border p-2 rounded-lg text-sm">
                            <option value="Design">Design</option><option value="BE">BE</option><option value="FE">FE</option><option value="QA">QA</option><option value="Mobile">Mobile</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="startDate" class="border p-1 rounded text-xs">
                        <input type="date" id="deadline" class="border p-1 rounded text-xs">
                    </div>
                    <input type="number" id="mandays" placeholder="Mandays" class="w-full border p-2 rounded-lg text-sm">
                    <select id="taskStatus" class="border p-2 rounded-lg text-sm w-full"></select>
                    <div id="reasonSection" class="hidden"><textarea id="changeReason" placeholder="Reason for change..." class="w-full border-2 border-red-200 p-2 rounded text-xs mt-2"></textarea></div>
                    <button onclick="handleTaskSubmit()" id="submitBtn" class="w-full bg-[#27AE60] text-white py-2 rounded-lg font-bold">Add Task</button>
                    <button onclick="resetForm()" id="cancelBtn" class="w-full bg-gray-100 text-gray-500 py-1 rounded text-xs hidden mt-1">Cancel</button>
                </div>
            </section>
        </div>

        <div class="xl:col-span-3 space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <div class="gantt-container" id="ganttContainer">
                    <div class="gantt-grid-wrapper">
                        <div id="ganttHeaderMonths" class="month-header-wrapper"></div>
                        <div class="gantt-row">
                            <div class="sticky-col font-bold bg-gray-50">Timeline Header</div>
                            <div id="ganttHeaderDays" class="day-grid"></div>
                        </div>
                        <div id="ganttRows"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-left text-xs">
                    <thead class="bg-[#2C3E50] text-white">
                        <tr>
                            <th class="p-3 w-10 text-center">#</th>
                            <th class="p-3">Task Detail</th>
                            <th class="p-3 text-center">Mandays</th>
                            <th class="p-3">Timeline</th>
                            <th class="p-3 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="taskBody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="historyModal" class="modal flex items-center justify-center">
        <div class="bg-white p-6 rounded-xl max-w-xl w-full mx-4 shadow-2xl">
            <div class="flex justify-between items-center mb-4"><h3 class="font-bold">Change History</h3><button onclick="closeModal()" class="text-2xl">&times;</button></div>
            <div id="historyContent" class="space-y-3 max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const year = 2026;
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let assignees = JSON.parse(localStorage.getItem('assignees')) || ['FN', 'Por', 'NP', 'PM'];
        let statuses = ['In Progress', 'Ongoing', 'Complete'];
        const yearDates = [];
        let d = new Date(year, 0, 1);
        while(d.getFullYear() === year) { yearDates.push(new Date(d)); d.setDate(d.getDate()+1); }

        function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); localStorage.setItem('assignees', JSON.stringify(assignees)); render(); }

        function calculateEndDate(start, mandays, hList) {
            let date = new Date(start); let count = 0;
            while(count < mandays) {
                const day = date.getDay(); const ds = date.toISOString().split('T')[0];
                if(day !== 0 && day !== 6 && !hList.includes(ds)) count++;
                if(count < mandays) date.setDate(date.getDate() + 1);
            }
            return date;
        }

        // --- QA Suggestion Logic ---
        function calculateAndSuggestQA() {
            const numDevs = parseInt(document.getElementById('numDevs').value) || 1;
            const numQAs = parseInt(document.getElementById('numQAs').value) || 1;
            
            // ดึงค่า Mandays ทั้งหมดจากงานฝั่ง Dev (BE, FE, Mobile)
            const devMandays = tasks.filter(t => ['BE','FE','Mobile'].includes(t.role)).reduce((s,t) => s + (t.mandays||0), 0);
            
            if(devMandays === 0) { alert("ยังไม่มีงานฝั่ง Dev ให้คำนวณครับ"); return; }

            // สูตร: (Total Dev Mandays / Num QAs) * 0.3
            const suggestion = ((devMandays / numQAs) * 0.3).toFixed(1);
            
            const resultBox = document.getElementById('qaResultBox');
            const resultText = document.getElementById('qaResultText');
            resultBox.classList.remove('hidden');
            resultText.innerHTML = `จากงาน Dev รวม <b>${devMandays} วัน</b> โดยมี QA <b>${numQAs} คน</b><br>แนะนำให้ใช้เวลา Test ประมาณ: <b>${suggestion} วันต่อคน</b>`;
            
            // ใส่ค่าลงในฟอร์มทันที
            document.getElementById('mandays').value = Math.ceil(suggestion);
            document.getElementById('taskRole').value = 'QA';
            document.getElementById('taskName').value = 'QA Cycle for Project';
        }

        function addItem(type, id) {
            const val = document.getElementById(id).value.trim();
            if(val) { assignees.push(val); document.getElementById(id).value = ''; save(); }
        }

        function handleTaskSubmit() {
            const eid = document.getElementById('editingId').value;
            const holidays = document.getElementById('holidaysInput').value.split(',').map(x => x.trim());
            const tData = {
                id: eid ? parseInt(eid) : Date.now(),
                name: document.getElementById('taskName').value,
                assignee: document.getElementById('taskAssignee').value,
                role: document.getElementById('taskRole').value,
                start: document.getElementById('startDate').value,
                mandays: parseInt(document.getElementById('mandays').value),
                deadline: document.getElementById('deadline').value,
                status: document.getElementById('taskStatus').value,
                history: eid ? tasks.find(x => x.id === parseInt(eid)).history || [] : []
            };

            if(eid) {
                const old = tasks.find(x => x.id === parseInt(eid));
                if(old.start !== tData.start || old.mandays !== tData.mandays) {
                    const reason = document.getElementById('changeReason').value;
                    if(!reason) { document.getElementById('reasonSection').classList.remove('hidden'); alert("Timeline เปลี่ยน กรุณากรอกเหตุผล"); return; }
                    tData.history.push({ time: new Date().toLocaleString(), msg: `เลื่อนจาก ${old.start} (${old.mandays}d) เป็น ${tData.start} (${tData.mandays}d)`, reason });
                }
                tasks[tasks.findIndex(x => x.id === parseInt(eid))] = tData;
            } else { tasks.push(tData); }
            resetForm(); save();
        }

        function resetForm() {
            document.getElementById('editingId').value = ""; document.getElementById('taskName').value = "";
            document.getElementById('submitBtn').innerText = "Add Task"; document.getElementById('reasonSection').classList.add('hidden');
        }

        function scrollToToday() {
            const el = document.querySelector('.today-cell');
            if(el) el.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }

        function render() {
            const holidays = document.getElementById('holidaysInput').value.split(',').map(x => x.trim());
            const todayStr = new Date().toISOString().split('T')[0];

            // Sync Settings
            const sync = (id, list) => { document.getElementById(id).innerHTML = list.map(v => `<option value="${v}">${v}</option>`).join(''); };
            sync('taskAssignee', assignees); sync('taskStatus', statuses);

            document.getElementById('assigneeList').innerHTML = assignees.map((a,i) => `
                <span class="bg-gray-100 text-[9px] px-2 py-1 rounded flex items-center gap-1">${a} 
                <button onclick="assignees.splice(${i},1);save()" class="text-red-400">×</button></span>`).join('');

            // Headers
            const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            let mH = ''; let dH = ''; let curM = -1; let mDays = 0;
            yearDates.forEach((d, i) => {
                const ds = d.toISOString().split('T')[0];
                if(d.getMonth() !== curM) {
                    if(curM !== -1) mH += `<div class="month-header" style="width:${mDays*30}px">${monthNames[curM]}</div>`;
                    curM = d.getMonth(); mDays = 1;
                } else { mDays++; }
                if(i === yearDates.length-1) mH += `<div class="month-header" style="width:${mDays*30}px">${monthNames[curM]}</div>`;
                dH += `<div class="day-cell ${d.getDay()===0||d.getDay()===6?'weekend':''} ${holidays.includes(ds)?'holiday-cell':''} ${ds===todayStr?'today-cell':''}">
                       ${ds===todayStr?'<div class="today-line"></div>':''} ${d.getDate()}</div>`;
            });
            document.getElementById('ganttHeaderMonths').innerHTML = mH;
            document.getElementById('ganttHeaderDays').innerHTML = dH;

            // Rows
            const tBody = document.getElementById('taskBody');
            const gRows = document.getElementById('ganttRows');
            tBody.innerHTML = ''; gRows.innerHTML = '';

            tasks.forEach((t, idx) => {
                const end = calculateEndDate(t.start, t.mandays, holidays);
                const endS = end.toISOString().split('T')[0];
                const overdue = t.deadline && endS > t.deadline;

                tBody.innerHTML += `
                    <tr class="${overdue?'bg-red-50':''}">
                        <td class="p-3 text-center">${idx+1}</td>
                        <td class="p-3"><b>${t.name}</b><br><span class="text-gray-400">${t.assignee} (${t.role})</span></td>
                        <td class="p-3 text-center font-bold">${t.mandays}</td>
                        <td class="p-3 text-xs">${t.start} <br> ${endS}</td>
                        <td class="p-3 text-right">
                            <button onclick="showHistory(${t.id})" class="text-emerald-500 mr-2">Logs</button>
                            <button onclick="editTask(${t.id})" class="text-blue-500 mr-2">Edit</button>
                            <button onclick="tasks.splice(${idx},1);save()" class="text-red-300">Del</button>
                        </td>
                    </tr>`;

                let rowH = `<div class="gantt-row">
                    <div class="sticky-col font-bold text-gray-500 shadow-sm">${t.name}</div>
                    <div class="day-grid">`;
                yearDates.forEach(d => {
                    const ds = d.toISOString().split('T')[0];
                    const isTask = ds >= t.start && ds <= endS;
                    rowH += `<div class="day-cell ${d.getDay()===0||d.getDay()===6?'weekend':''} ${holidays.includes(ds)?'holiday-cell':''} ${ds===todayStr?'today-cell':''}">
                        ${isTask ? `<div class="w-full ${overdue?'bg-red-400':'bg-accent'} task-bar"></div>` : ''}
                    </div>`;
                });
                gRows.innerHTML += rowH + `</div></div>`;
            });
        }

        function editTask(id) {
            const t = tasks.find(x => x.id === id);
            document.getElementById('editingId').value = t.id;
            document.getElementById('taskName').value = t.name;
            document.getElementById('taskAssignee').value = t.assignee;
            document.getElementById('taskRole').value = t.role;
            document.getElementById('startDate').value = t.start;
            document.getElementById('mandays').value = t.mandays;
            document.getElementById('taskStatus').value = t.status;
            document.getElementById('submitBtn').innerText = "Update Task";
            document.getElementById('reasonSection').classList.add('hidden');
        }

        function showHistory(id) {
            const t = tasks.find(x => x.id === id);
            const content = document.getElementById('historyContent');
            content.innerHTML = (t.history || []).map(h => `<div class="p-2 bg-gray-50 rounded text-xs"><b>${h.time}</b>: ${h.msg}<br><span class="italic">"เหตุผล: ${h.reason}"</span></div>`).join('') || "ไม่มีประวัติการแก้ไข";
            document.getElementById('historyModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('historyModal').style.display = 'none'; }

        window.onload = () => { render(); setTimeout(scrollToToday, 500); };
    </script>
</body>
</html>
