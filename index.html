<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Timeline & Resource Audit - Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Prompt', sans-serif; background-color: #F8F9FA; color: #2C3E50; }
        .bg-primary { background-color: #2C3E50; }
        .bg-accent { background-color: #27AE60; }
        .gantt-container { overflow-x: auto; border: 1px solid #e5e7eb; border-radius: 12px; background: white; }
        .gantt-grid-wrapper { display: inline-block; min-width: 100%; }
        .gantt-row { display: flex; width: max-content; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 40; border-right: 2px solid #e5e7eb; width: 180px; min-width: 180px; padding: 0 12px; display: flex; align-items: center; font-size: 11px; height: 42px; }
        .day-grid { display: grid; grid-template-columns: repeat(365, 32px); }
        .day-cell { border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; height: 42px; width: 32px; display: flex; align-items: center; justify-content: center; font-size: 9px; position: relative; }
        .month-header-wrapper { display: flex; margin-left: 180px; }
        .month-header { border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; background: #f8fafc; font-weight: 600; font-size: 11px; display: flex; align-items: center; justify-content: center; height: 32px; }
        .weekend { background-color: #f8fafc; color: #cbd5e1; }
        .holiday-cell { background-color: #fee2e2 !important; color: #ef4444; }
        .today-cell { background-color: rgba(44, 62, 80, 0.05); }
        .today-line { width: 2px; background: #2C3E50; height: 100%; position: absolute; left: 50%; z-index: 30; pointer-events: none; }
        .deadline-sign { width: 4px; height: 70%; background-color: #EF4444; position: absolute; right: 0; z-index: 35; border-radius: 2px; }
        .deadline-flag { font-size: 10px; position: absolute; top: -2px; right: -2px; z-index: 36; }
        .task-bar { height: 18px; border-radius: 4px; margin: auto 0; z-index: 10; position: relative; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-[1600px] mx-auto mb-6 bg-white p-6 rounded-2xl shadow-sm border-l-8 border-[#27AE60]">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-[#2C3E50]">Smart Timeline & Audit</h1>
                <p class="text-gray-400 text-sm">Roadmap 2026 - Fixed Version</p>
            </div>
            <div class="flex gap-2">
                <button onclick="scrollToToday()" class="bg-[#2C3E50] text-white px-5 py-2 rounded-xl font-bold text-sm">Jump to Today</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto grid grid-cols-1 xl:grid-cols-4 gap-8">
        
        <div class="xl:col-span-1 space-y-6">
            <section class="bg-emerald-50 p-6 rounded-2xl border border-emerald-100">
                <h2 class="font-bold mb-4 text-emerald-800 flex items-center gap-2 text-sm">🛠 QA Suggester</h2>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-white p-2 rounded-lg border text-center">
                            <label class="block text-[9px] font-bold text-gray-400 uppercase">Dev Count</label>
                            <input type="number" id="numDevs" value="1" min="1" class="w-full text-center font-bold outline-none">
                        </div>
                        <div class="bg-white p-2 rounded-lg border text-center">
                            <label class="block text-[9px] font-bold text-gray-400 uppercase">QA Count</label>
                            <input type="number" id="numQAs" value="1" min="1" class="w-full text-center font-bold outline-none">
                        </div>
                    </div>
                    <button onclick="calculateAndSuggestQA()" class="w-full bg-emerald-600 text-white py-2 rounded-xl font-bold text-xs">Suggest QA Time</button>
                    <div id="qaResultBox" class="hidden p-3 bg-white rounded-lg border border-emerald-100 text-[10px] text-emerald-700 italic">
                        <p id="qaResultText"></p>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 id="formTitle" class="font-bold mb-4 text-[#2C3E50]">Add/Edit Task</h2>
                <input type="hidden" id="editingId" value="">
                <div class="space-y-3">
                    <input type="text" id="taskName" placeholder="Task Name" class="w-full border p-2 rounded-xl text-sm outline-none">
                    <div class="grid grid-cols-2 gap-2">
                        <select id="taskAssignee" class="border p-2 rounded-xl text-sm bg-gray-50"></select>
                        <select id="taskRole" class="border p-2 rounded-xl text-sm bg-gray-50">
                            <option value="BE">BE</option><option value="FE">FE</option><option value="QA">QA</option><option value="Design">Design</option><option value="Mobile">Mobile</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="text-[9px] font-bold text-gray-400">START</label><input type="date" id="startDate" class="w-full border p-1 rounded text-xs"></div>
                        <div><label class="text-[9px] font-bold text-gray-400">DEADLINE</label><input type="date" id="deadline" class="w-full border p-1 rounded text-xs"></div>
                    </div>
                    <div class="bg-blue-50 p-2 rounded-lg"><label class="text-[9px] font-bold text-blue-400">MANDAYS</label><input type="number" id="mandays" placeholder="Days" class="w-full bg-transparent text-sm font-bold outline-none"></div>
                    <select id="taskStatus" class="border p-2 rounded-xl text-sm w-full bg-gray-50"></select>
                    <textarea id="taskNotes" placeholder="Notes..." class="w-full border p-2 rounded text-xs h-12 outline-none"></textarea>
                    
                    <div id="reasonSection" class="hidden p-2 bg-red-50 rounded-lg border border-red-200">
                        <label class="text-[9px] text-red-500 font-bold uppercase">Reason for Timeline Change *</label>
                        <textarea id="changeReason" placeholder="Why is this moving?" class="w-full bg-transparent text-xs outline-none h-12"></textarea>
                    </div>

                    <button onclick="handleTaskSubmit()" id="submitBtn" class="w-full bg-[#27AE60] text-white py-3 rounded-xl font-bold shadow-lg">Save Task</button>
                    <button onclick="resetForm()" id="cancelBtn" class="w-full text-xs text-gray-400 mt-1 hidden">Cancel</button>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="font-bold mb-3 text-xs uppercase text-gray-400">Settings</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-[9px] font-bold text-gray-400">HOLIDAYS (Comma separated)</label>
                        <textarea id="holidaysInput" oninput="saveHolidays()" placeholder="2026-05-01, 2026-05-04" class="w-full border p-2 rounded-xl text-xs h-16 bg-gray-50 outline-none"></textarea>
                    </div>
                    <div id="assigneeList" class="flex flex-wrap gap-1"></div>
                    <div class="flex gap-1">
                        <input type="text" id="newAssignee" class="flex-1 border p-1 rounded text-xs" placeholder="+ Name">
                        <button onclick="addItem('assignees', 'newAssignee')" class="bg-primary text-white px-2 rounded">+</button>
                    </div>
                </div>
            </section>
        </div>

        <div class="xl:col-span-3 space-y-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="gantt-container" id="ganttContainer">
                    <div class="gantt-grid-wrapper">
                        <div id="ganttHeaderMonths" class="month-header-wrapper"></div>
                        <div class="gantt-row">
                            <div class="sticky-col font-bold text-gray-300 uppercase">Tasks / Timeline</div>
                            <div id="ganttHeaderDays" class="day-grid"></div>
                        </div>
                        <div id="ganttRows"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden text-xs">
                <table class="w-full text-left">
                    <thead class="bg-[#2C3E50] text-white">
                        <tr>
                            <th class="p-4 w-10 text-center">#</th>
                            <th class="p-4">Task Detail</th>
                            <th class="p-4 text-center">Mandays</th>
                            <th class="p-4">Timeline</th>
                            <th class="p-4 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="taskBody" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="historyModal" class="modal flex items-center justify-center">
        <div class="bg-white p-6 rounded-2xl max-w-xl w-full mx-4 shadow-2xl overflow-hidden">
            <div class="flex justify-between items-center mb-4"><h3 class="font-bold">Audit History</h3><button onclick="closeModal()" class="text-2xl text-gray-300">&times;</button></div>
            <div id="historyContent" class="space-y-3 max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const year = 2026;
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let assignees = JSON.parse(localStorage.getItem('assignees')) || ['FN', 'Por', 'NP', 'PM'];
        let holidays = JSON.parse(localStorage.getItem('holidays')) || [];
        let statuses = ['In Progress', 'Ongoing', 'Complete'];

        const yearDates = [];
        let d = new Date(year, 0, 1);
        while(d.getFullYear() === year) { yearDates.push(new Date(d)); d.setDate(d.getDate()+1); }

        function saveAll() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            localStorage.setItem('assignees', JSON.stringify(assignees));
            localStorage.setItem('holidays', JSON.stringify(holidays));
            render();
        }

        function saveHolidays() {
            const hInput = document.getElementById('holidaysInput').value;
            holidays = hInput.split(',').map(x => x.trim()).filter(x => x);
            saveAll();
        }

        function calculateEndDate(start, mandays, hList) {
            let dt = new Date(start); let count = 0;
            while(count < mandays) {
                const day = dt.getDay(); const ds = dt.toISOString().split('T')[0];
                if(day !== 0 && day !== 6 && !hList.includes(ds)) count++;
                if(count < mandays) dt.setDate(dt.getDate() + 1);
            }
            return dt;
        }

        function calculateAndSuggestQA() {
            const numQAs = parseInt(document.getElementById('numQAs').value) || 1;
            const devDays = tasks.filter(t => ['BE','FE','Mobile'].includes(t.role)).reduce((s,t) => s + (t.mandays||0), 0);
            if(devDays === 0) return alert("No dev tasks found.");
            const suggest = ((devDays / numQAs) * 0.3).toFixed(1);
            document.getElementById('qaResultBox').classList.remove('hidden');
            document.getElementById('qaResultText').innerHTML = `Dev Days: <b>${devDays}</b> | QA: <b>${numQAs}</b><br>Suggested Test Period: <b>${suggest} days</b>`;
            document.getElementById('mandays').value = Math.ceil(suggest);
            document.getElementById('taskRole').value = 'QA';
        }

        function handleTaskSubmit() {
            const eid = document.getElementById('editingId').value;
            const tData = {
                id: eid ? parseInt(eid) : Date.now(),
                name: document.getElementById('taskName').value,
                assignee: document.getElementById('taskAssignee').value,
                role: document.getElementById('taskRole').value,
                start: document.getElementById('startDate').value,
                mandays: parseInt(document.getElementById('mandays').value),
                deadline: document.getElementById('deadline').value,
                status: document.getElementById('taskStatus').value,
                notes: document.getElementById('taskNotes').value,
                history: eid ? (tasks.find(x => x.id === parseInt(eid))?.history || []) : []
            };

            if(!tData.name || !tData.start || !tData.mandays) return alert("กรุณากรอกข้อมูลให้ครบ (ชื่อ, วันเริ่ม, Mandays)");

            // Validation for Editing
            if(eid) {
                const old = tasks.find(x => x.id === parseInt(eid));
                if(old.start !== tData.start || old.mandays !== tData.mandays || old.deadline !== tData.deadline) {
                    const reason = document.getElementById('changeReason').value.trim();
                    if(!reason) {
                        document.getElementById('reasonSection').classList.remove('hidden');
                        alert("กรุณากรอกเหตุผลที่เลื่อน Timeline");
                        return;
                    }
                    tData.history.push({ time: new Date().toLocaleString(), msg: `เลื่อนจาก ${old.start} เป็น ${tData.start}`, reason });
                }
                tasks[tasks.findIndex(x => x.id === parseInt(eid))] = tData;
            } else {
                tasks.push(tData);
            }
            
            resetForm();
            saveAll();
        }

        function render() {
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('holidaysInput').value = holidays.join(', ');

            // Sync Dropdowns
            const sync = (id, list) => document.getElementById(id).innerHTML = list.map(v => `<option value="${v}">${v}</option>`).join('');
            sync('taskAssignee', assignees); sync('taskStatus', statuses);

            document.getElementById('assigneeList').innerHTML = assignees.map((a,i) => `
                <span class="bg-gray-100 text-[9px] px-2 py-1 rounded flex items-center gap-1">${a} 
                <button onclick="assignees.splice(${i},1);saveAll()" class="text-red-400">×</button></span>`).join('');

            // Build Charts Header
            const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
            let mH = ''; let dH = ''; let curM = -1; let mDays = 0;
            yearDates.forEach((d, i) => {
                const ds = d.toISOString().split('T')[0];
                if(d.getMonth() !== curM) {
                    if(curM !== -1) mH += `<div class="month-header" style="width:${mDays*32}px">${monthNames[curM]}</div>`;
                    curM = d.getMonth(); mDays = 1;
                } else { mDays++; }
                if(i === yearDates.length-1) mH += `<div class="month-header" style="width:${mDays*32}px">${monthNames[curM]}</div>`;
                dH += `<div class="day-cell ${d.getDay()===0||d.getDay()===6?'weekend':''} ${holidays.includes(ds)?'holiday-cell':''} ${ds===todayStr?'today-cell':''}">
                       ${ds===todayStr?'<div class="today-line"></div>':''} ${d.getDate()}</div>`;
            });
            document.getElementById('ganttHeaderMonths').innerHTML = mH;
            document.getElementById('ganttHeaderDays').innerHTML = dH;

            // Build Rows
            const tBody = document.getElementById('taskBody');
            const gRows = document.getElementById('ganttRows');
            tBody.innerHTML = ''; gRows.innerHTML = '';

            tasks.forEach((t, idx) => {
                const end = calculateEndDate(t.start, t.mandays, holidays);
                const endS = end.toISOString().split('T')[0];
                const overdue = t.deadline && endS > t.deadline;

                tBody.innerHTML += `
                    <tr class="${overdue?'bg-red-50':''}">
                        <td class="p-4 text-center font-bold text-gray-300">${idx+1}</td>
                        <td class="p-4"><b>${t.name}</b><br><span class="text-gray-400">${t.assignee} (${t.role})</span></td>
                        <td class="p-4 text-center font-bold text-gray-600">${t.mandays}</td>
                        <td class="p-4 text-[10px] leading-tight">${t.start}<br><span class="${overdue?'text-red-500 font-bold':''}">End: ${endS}</span></td>
                        <td class="p-4 text-right">
                            <button onclick="showHistory(${t.id})" class="text-emerald-500 font-bold mr-2 underline">Logs</button>
                            <button onclick="editTask(${t.id})" class="text-blue-500 mr-2">Edit</button>
                            <button onclick="tasks.splice(${idx},1);saveAll()" class="text-red-200 hover:text-red-500">Del</button>
                        </td>
                    </tr>`;

                let rowH = `<div class="gantt-row group"><div class="sticky-col font-bold text-gray-500 group-hover:bg-slate-50 border-b">${t.name}</div><div class="day-grid">`;
                yearDates.forEach(d => {
                    const ds = d.toISOString().split('T')[0];
                    const isTask = ds >= t.start && ds <= endS;
                    const isDeadline = ds === t.deadline;
                    rowH += `<div class="day-cell ${d.getDay()===0||d.getDay()===6?'weekend':''} ${holidays.includes(ds)?'holiday-cell':''} ${ds===todayStr?'today-cell':''}">
                        ${isTask ? `<div class="w-full ${overdue?'bg-red-300':'bg-accent'} task-bar"></div>` : ''}
                        ${isDeadline ? `<div class="deadline-sign"></div><div class="deadline-flag">🚩</div>` : ''}
                    </div>`;
                });
                gRows.innerHTML += rowH + `</div></div>`;
            });
        }

        function editTask(id) {
            const t = tasks.find(x => x.id === id);
            document.getElementById('editingId').value = t.id;
            document.getElementById('taskName').value = t.name;
            document.getElementById('taskAssignee').value = t.assignee;
            document.getElementById('taskRole').value = t.role;
            document.getElementById('startDate').value = t.start;
            document.getElementById('mandays').value = t.mandays;
            document.getElementById('deadline').value = t.deadline || '';
            document.getElementById('taskStatus').value = t.status;
            document.getElementById('taskNotes').value = t.notes || '';
            
            document.getElementById('submitBtn').innerText = "Update Task";
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('reasonSection').classList.add('hidden');
        }

        function resetForm() {
            document.getElementById('editingId').value = "";
            document.getElementById('taskName').value = "";
            document.getElementById('mandays').value = "";
            document.getElementById('startDate').value = "";
            document.getElementById('deadline').value = "";
            document.getElementById('taskNotes').value = "";
            document.getElementById('changeReason').value = "";
            document.getElementById('submitBtn').innerText = "Save Task";
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('reasonSection').classList.add('hidden');
        }

        function addItem(type, id) {
            const v = document.getElementById(id).value.trim();
            if(v) { assignees.push(v); document.getElementById(id).value = ''; saveAll(); }
        }

        function showHistory(id) {
            const t = tasks.find(x => x.id === id);
            const content = document.getElementById('historyContent');
            content.innerHTML = (t.history || []).map(h => `
                <div class="p-3 bg-slate-50 rounded-xl border-l-4 border-emerald-500 text-[11px]">
                    <div class="font-bold text-gray-400 mb-1">${h.time}</div>
                    <div>${h.msg}</div>
                    <div class="italic text-emerald-700 mt-1">"เหตุผล: ${h.reason}"</div>
                </div>`).join('') || "<p class='text-center text-gray-400 py-4'>ไม่มีประวัติการแก้ไข</p>";
            document.getElementById('historyModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('historyModal').style.display = 'none'; }
        function scrollToToday() { const el = document.querySelector('.today-cell'); if(el) el.scrollIntoView({ behavior: 'smooth', inline: 'center' }); }

        window.onload = () => { render(); setTimeout(scrollToToday, 500); };
    </script>
</body>
</html>
